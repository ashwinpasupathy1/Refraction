name: Refraction
options:
  bundleIdPrefix: com.refraction
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  RefractionRenderer:
    path: ../RefractionRenderer

targets:
  Refraction:
    type: application
    platform: macOS
    sources:
      - path: Refraction
        excludes:
          - "**/.DS_Store"
          - "Resources/python-env/**"
    resources:
      - path: Refraction/Assets.xcassets
      - path: Refraction/Resources/SampleData
        type: folder
        buildPhase: resources
      - path: Refraction/Resources/DocumentIcon.icns
      - path: Refraction/Resources/StylePreviews
        type: folder
        buildPhase: resources
    dependencies:
      - package: RefractionRenderer
    info:
      path: Refraction/Info.plist
      properties:
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.refraction.refract
            UTTypeDescription: Refraction Project
            UTTypeIconFiles:
              - DocumentIcon
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - refract
        CFBundleDocumentTypes:
          - CFBundleTypeName: Refraction Project
            CFBundleTypeRole: Editor
            CFBundleTypeIconFile: DocumentIcon
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes:
              - com.refraction.refract
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.refraction.app
        PRODUCT_NAME: Refraction
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Refraction/Refraction.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
