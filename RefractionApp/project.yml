name: Refraction
options:
  bundleIdPrefix: com.refraction
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  RefractionRenderer:
    path: ../RefractionRenderer

targets:
  Refraction:
    type: application
    platform: macOS
    sources:
      - path: Refraction
        excludes:
          - "Resources/python-env/**"
    dependencies:
      - package: RefractionRenderer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.refraction.app
        PRODUCT_NAME: Refraction
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "5.9"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
